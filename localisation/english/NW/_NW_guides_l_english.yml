 JAP_Machida_Chuji_title: "«I can't stop the liberalization»\nChūji's Second Cabinet"
 JAP_Machida_Chuji_description: "Suppress the conspirators with the help of the navy, and then convince Prime Minister Okada to remain in cabinet.\n\nContinue to stabilize the political situation, investigate the conspiracy, and condemn the conspirators by lowering the Level of Insubordination to 0.\n\nSupport the supporters of democracy among the elites in the balance of power of the Shōwa Democracy. Hand over the post of Prime Minister to the leader of the Rikken Minseitō. Maintain Minseitō's popularity among voters until the next election, in which Minseitō wins again and its leader retains the right to form a government."
 #
 JAP_Saito_Takao_title: "«I can't stop the liberalization»\nКабинет Такао"
 JAP_Saito_Takao_description: "$JAP_Machida_Chuji_description$"
 #
 JAP_Kenzo_Matsumura_title: "«I can't stop the liberalization»\nКабинет Мацумуры"
 JAP_Kenzo_Matsumura_description: "$JAP_Machida_Chuji_description$"
 #
 JAP_Ryutaro_Nagai_title: "«Plastic war»\nRyūtarō Nagai`s Cabinet"
 JAP_Ryutaro_Nagai_description: "Suppress the conspirators with the help of the navy, and then convince Prime Minister Okada to remain in cabinet. Continue to stabilize the political situation, investigate the conspiracy and condemn the conspirators by reducing the Level of insubordination to 0. Support the supporters of democracy among the elites in the balance of power of Shōwa Democracy. Hand over the post of Prime Minister to the leader of the Rikken Minseitō. In the "Counterbalance to Kakushintō" event, allow Ryūtarō Nagai to form a new Shinshinto party, and then maintain its popularity until the next election, after which Ryūtarō will become the new prime minister."
 #
 JAP_Yuki_Taketi_title: "«Plastic war»\nКабинет Такети"
 JAP_Yuki_Taketi_description: "$JAP_Ryutaro_Nagai_description$"
 #
 JAP_Aso_Hisashi_title: "«Such different National Socialists»\nHisashi's Office"
 JAP_Aso_Hisashi_description: "Suppress the conspirators with the help of the navy, and then convince Prime Minister Okada to remain in office. Continue to stabilize the political situation, investigate the conspiracy and condemn the conspirators by reducing the Level of insubordination to 0. Support the supporters of democracy among the elites in the balance of power of Shōwa Democracy. Hand over the post of Prime Minister to the leader of the Rikken Minseitō. In the chain of events related to the formation of a new parliamentary party, achieve the formation of Kakushintō without Seigō Nakano. Raise the popularity of the new party so that it wins the next election." # TODO
 #
 JAP_Inejiro_Asanuma_title: "«Такие разные национал-социалисты»\nКабинет Асанумы"
 JAP_Inejiro_Asanuma_description: "$JAP_Aso_Hisashi_description$"
 #
 JAP_Jotaro_Kawakami_title: "«Такие разные национал-социалисты»\nКабинет Каваками"
 JAP_Jotaro_Kawakami_description: "$JAP_Aso_Hisashi_description$"
 #
 JAP_Abe_Iso_title: "«Blessed Social Democracy»\nAbe Isoo`s Cabinet"
 JAP_Abe_Iso_description: "Suppress the conspirators with the help of the navy, and then convince Prime Minister Okada to remain in office. Continue to stabilize the political situation, investigate the conspiracy and condemn the conspirators by reducing the Level of insubordination to 0. Support the supporters of democracy among the elites in the balance of power of Shōwa Democracy. Hand over the post of Prime Minister to the leader of the Rikken Minseitō. Raise  Shakai Taishūtō's popularity so that she wins the next election. Have time to complete the "Reunite the Takahashi Group" focus before March 1, 1938."
 #
 JAP_Tetsu_Katayama_title: "«Благословенная социал-демократия»\nКабинет Катаямы"
 JAP_Tetsu_Katayama_description: "$JAP_Abe_Iso_description$"
 #
 JAP_Yoshihika_Tokugawa_title: "«Благословенная социал-демократия»\nКабинет Токугавы"
 JAP_Yoshihika_Tokugawa_description: "$JAP_Abe_Iso_description$"
 #
 JAP_Ichiro_Hatoyama_title: "«Atonement for sins»\nHatoyama`s Cabinet"
 JAP_Ichiro_Hatoyama_description: "Suppress the conspirators with the help of the navy, and then convince Prime Minister Okada to remain in office. Continue to stabilize the political situation, investigate the conspiracy and condemn the conspirators by reducing the Level of insubordination to 0. Support the supporters of democracy among the elites in the balance of power of Shōwa Democracy. Hand over the post of Prime Minister to the leader of the Rikken Minseitō. In the chain of events surrounding the collapse of Rikken Seiyūkai, ensure that Ichirō Hatoyama leads the entire party or its orthodox faction. Lead the relevant party to victory in the next parliamentary elections." # TODO
 #
 JAP_Chikuhei_Nakajima_title: "«Cyberpunk 1947»\nNakajima`s Cabinet"
 JAP_Chikuhei_Nakajima_description: "Suppress the conspirators with the help of the navy, and then convince Prime Minister Okada to remain in office. Continue to stabilize the political situation, investigate the conspiracy and condemn the conspirators by reducing the Level of insubordination to 0. Support the supporters of democracy among the elites in the balance of power of Shōwa Democracy. Hand over the post of Prime Minister to the leader of the Rikken Minseitō. In the chain of events surrounding the collapse of the Rikken Seiyūkai, ensure that Fusanosuke Kuhara leads the orthodox faction of the party. Lead this party to victory in the next parliamentary elections."
 #
 JAP_Seigo_Nakano_title: "«Redefining Capitalism»\nNakano`s Cabinet"
 JAP_Seigo_Nakano_description: "Suppress the conspirators with the help of the navy, and then convince Prime Minister Okada to remain in office. Continue to stabilize the political situation, investigate the conspiracy and condemn the conspirators by reducing the Level of insubordination to 0. Support the supporters of democracy among the elites in the balance of power of Shōwa Democracy. Hand over the post of Prime Minister to the leader of the Rikken Minseitō parliamentary party. Boost Tōhōkaii's popularity so that it wins the next election. (тут кстати ещё будет пасхалка для игроков, выйти в этот фокус можно ещё по другому)" # TODO
 #
 JAP_Fusanosuke_Kuhara_title: "«A dangerous alliance»\nKuhara`s Cabinet"
 JAP_Fusanosuke_Kuhara_description: "Suppress the conspirators with the help of the navy, and then convince Prime Minister Okada to remain in office. Continue to stabilize the political situation, investigate the conspiracy and condemn the conspirators by reducing the Level of insubordination to 0. Support the supporters of democracy among the elites in the balance of power of Shōwa Democracy. Hand over the post of Prime Minister to the leader of the Rikken Minseitō parliamentary party. In the chain of events surrounding the collapse of the Rikken Seiyūkai, ensure that Fusanosuke Kuhara leads the orthodox faction of the party. Lead this party to victory in the next parliamentary elections."
 #
 JAP_Fumimaro_Konoe_3_title: "«Опасный союз»\nКабинет Коноэ"
 JAP_Fumimaro_Konoe_3_description: "Подавите заговорщиков при помощи флота, после чего убедите премьера Окаду остаться на своём посту. Продолжите стабилизацию политической обстановки, расследуйте заговор и осудите заговорщиков, снизив Уровень неподчинения до 0. Поддерживайте сторонников демократии среди элит в балансе сил Демократия Сёва. Передайте пост премьер-министра лидеру парламентской партии Риккен Минсейто. В цепочке событий вокруг объединения Тохокай и Шакай Тайшуто, добейтесь того, чтобы Коноэ возглавил новую партию. Приведите эту партию до победы на следующих парламентских выборах."
 # 
 JAP_Mitsumasa_Yonai_title: "«The guarantor of State stability»\nYonai`s Cabinet"
 JAP_Mitsumasa_Yonai_description: "Suppress the conspirators with the help of the navy, and then convince Prime Minister Okada to remain in office. Continue to stabilize the political situation, investigate the conspiracy and condemn the conspirators by reducing the Level of insubordination to 0. Support the supporters of democracy among the elites in the balance of power of Shōwa Democracy. Keep the post of Prime Minister for Admiral Okada. Hand over the post of Prime Minister to Yonai."
 #
 JAP_Hirota_Koki_title: "Кабинет Хироты Коки"
 JAP_Hirota_Koki_description: "Подавите заговорщиков и передайте пост премьер-министра Хироте Коки." 
 #
 JAP_Shigeru_Yoshida_bureaucrat_title: "«Прыжок в будущее»\nКабинет бюрократов-реформаторов"
 JAP_Shigeru_Yoshida_bureaucrat_description: "Подавите заговорщиков и передайте пост премьер-министра Хироте Коки. Дважды пойдите на уступки военным в расширении бюджета, добейтесь ухода в отставку Хироты и выберите в качестве нового премьера Сигэру Ёсиду."
 #
 JAP_Hiroo_Wada_title: "$JAP_Shigeru_Yoshida_bureaucrat_title$"
 JAP_Hiroo_Wada_description: "$JAP_Shigeru_Yoshida_bureaucrat_description$"
 #
 MAN_nobusuke_kishi_title: "$JAP_Shigeru_Yoshida_bureaucrat_title$"
 MAN_nobusuke_kishi_description: "$JAP_Shigeru_Yoshida_bureaucrat_description$"
 #
 JAP_Technocratic_Council_title: "$JAP_Shigeru_Yoshida_bureaucrat_title$"
 JAP_Technocratic_Council_description: "$JAP_Shigeru_Yoshida_bureaucrat_description$"
 #
 JAP_Kazushige_Ugaki_title: "«Нормальный военный?»\nКабинет Угаки"
 JAP_Kazushige_Ugaki_description: "Подавите заговорщиков и передайте пост премьер-министра Хироте Коки. Выберите в качестве армейского министра в его кабинете Хисаити Тераучи, и когда случится Инцидент с харакири уйдите в отставку, после чего выберите в качестве нового премьера Кадзусигэ Угаки. Но не восстанавливайте за Хироту правило о действующих офицерах, иначе это приведёт к тяжёлым последствиям."
 #
 JAP_Esicuko_Tatekava_title: "«Нормальный военный»\nКабинет Татекавы"
 JAP_Esicuko_Tatekava_description: "$JAP_Kazushige_Ugaki_description$"
 #
 JAP_Dziro_Minami_title: "«Нормальный военный»\nКабинет Минами"
 JAP_Dziro_Minami_description: "$JAP_Kazushige_Ugaki_description$"
 #
 JAP_Kuniaki_Koiso_title: "«Нормальный военный»\nКабинет Коисо"
 JAP_Kuniaki_Koiso_description: "$JAP_Kazushige_Ugaki_description$"
 #
 JAP_Nobuyuki_Abe_title: "«Нормальный военный»\nКабинет Абэ"
 JAP_Nobuyuki_Abe_description: "$JAP_Kazushige_Ugaki_description$"
 #
 JAP_Senjuro_Hayashi_title: "«У Японской армии есть государство»\nКабинет Хаяси"
 JAP_Senjuro_Hayashi_description: "Подавите заговорщиков и передайте пост премьер-министра Хироте Коки. Убедите принца Коноэ занять пост лорда-хранителя Малой печати. Не репрессируйте фракцию Тосейха. Добейтесь ухода Хироты в отставку, после чего Коноэ порекомендует в качестве кандидатуры премьер-министра генерала Сэндзюро Хаяси. Откажитесь при формировании кабинета министров от предложения Маньчжурской фракции занять все посты в нём. Спустя несколько лет Хаяси почувствует себя хуже и его место займёт генерал Тодзё."
 #
 JAP_Hideki_Todze_title: "«У Японской армии есть государство»\nКабинет Тодзё"
 JAP_Hideki_Todze_description: "$JAP_Senjuro_Hayashi_description$"
 #
 JAP_Kanji_Ishiwara_title: "«Купить у американцев верёвку для их повешения»\nКабинет Маньчжурской фракции"
 JAP_Kanji_Ishiwara_description: "Подавите заговорщиков и передайте пост премьер-министра Хироте Коки. Убедите принца Коноэ занять пост лорда-хранителя Малой печати. Репрессируйте фракцию Тосейха. Добейтесь ухода Хироты в отставку, после чего Коноэ порекомендует в качестве кандидатуры премьер-министра генерала Сэндзюро Хаяси или Сейширо Итагаки. Кандзи Ишивара займёт вторую по важности должность в правительстве, а позже сможет стать и премьер-министром."
 #
 JAP_Seishiro_Itagaki_title: "$JAP_Kanji_Ishiwara_title$"
 JAP_Seishiro_Itagaki_description: "$JAP_Kanji_Ishiwara_description$"
 #
 JAP_Senjuro_Hayashi_2_title: "$JAP_Kanji_Ishiwara_title$"
 JAP_Senjuro_Hayashi_2_description: "$JAP_Kanji_Ishiwara_description$"
 #
 JAP_Kimura_Takeo_title: "«Позитивные гномики Ишивары»\nВосстановление демократии"
 JAP_Kimura_Takeo_description: "Сдвигайте баланс сил фракционности сторонников Ишивары влево. Выполните фокус «Формирование высочайшей культуры» до смерти Ишивары, или удерживайте баланс сил ниже -0.75 к его смерти в 1949 году.» "
 #
 JAP_Seishiro_Itagaki_2_title: "Всепожирающая нормальность\nВоенные сохраняют умеренность"
 JAP_Seishiro_Itagaki_2_description: "Поддерживайте баланс сил фракционности сторонников Ишивары посередине. Выполните фокус «Сила через науку» до смерти Ишивары, или удерживайте баланс сил выше -0.75 и ниже 0.75 к его смерти в 1949 году."
 # 
 JAP_Masanobu_Cudzi_title: "«Безумный человек в очках»\nПуть к победе над Западом"
 JAP_Masanobu_Cudzi_description: "Сдвигайте баланс сил фракционности сторонников Ишивары вправо. Выполните фокус «Исполнить предсказание Ничирэна» до смерти Ишивары, или удерживайте баланс сил выше 0.75 к его смерти в 1949 году."
 #
 JAP_Jinzaburo_Masaki_title: "Кабинет Масаки"
 JAP_Jinzaburo_Masaki_description: "В ходе путча молодых офицеров передайте пост премьер-министра генералу Дзиндзабуро Масаки."
 # 
 JAP_Jinzaburo_Masaki_2_title: "«Убей в себе государство»\nВоплощение идей Гондо Сэйкё"
 JAP_Jinzaburo_Masaki_2_description: "В ходе путча молодых офицеров передайте пост премьер-министра генералу Дзиндзабуро Масаки. Следите за терпением молодых офицеров и деятельностью противников Реставрации. Выполните фокус «Борьба с этатизмом» до лета 1937 года, пока не умер идеолог аграрного национализма Гондо Сэйкё. В конце пути к власти сможет прийти император Ясухито."
 #
 JAP_Yasuhito_2_title: "$JAP_Jinzaburo_Masaki_2_title$"
 JAP_Yasuhito_2_description: "$JAP_Jinzaburo_Masaki_2_description$"
 #
 JAP_Jinzaburo_Masaki_3_title: "«Little Dark Age»\nКабинет Кодохи"
 JAP_Jinzaburo_Masaki_3_description: "В ходе путча молодых офицеров передайте пост премьер-министра генералу Дзиндзабуро Масаки, но сохраните императором Хирохито. Следите за терпением молодых офицеров и деятельностью противников Реставрации. Выполните фокус «Возобновить миссию Ишивары в Маньчжоу-Го», а только затем «Правление исконной Кодохи»."
 #
 JAP_Heisuke_Yanagava_title: "$JAP_Jinzaburo_Masaki_3_title$"
 JAP_Heisuke_Yanagava_description: "$JAP_Jinzaburo_Masaki_3_description$"
 #
 JAP_Sadao_Araki_title: "$JAP_Jinzaburo_Masaki_3_title$"
 JAP_Sadao_Araki_description: "$JAP_Jinzaburo_Masaki_3_description$"
 #
 JAP_Teiichi_Suzuki_title: "$JAP_Jinzaburo_Masaki_3_title$"
 JAP_Teiichi_Suzuki_description: "$JAP_Jinzaburo_Masaki_3_description$"
 #
 JAP_Nobumasa_Suecegu_title: "$JAP_Jinzaburo_Masaki_3_title$"
 JAP_Nobumasa_Suecegu_description: "$JAP_Jinzaburo_Masaki_3_description$"
 #
 JAP_Kodzaburo_Tachibana_title: "«Демократ под маской монархиста»\nКабинет Тачибаны"
 JAP_Kodzaburo_Tachibana_description: "В ходе путча молодых офицеров передайте пост премьер-министра генералу Дзиндзабуро Масаки. Следите за терпением молодых офицеров и деятельностью противников Реставрации. Выполните фокус «Патриотическая реформа»."
 #
 JAP_Ikki_Kita_title: "«Сделать Японию Россией»\nКабинет Киты"
 JAP_Ikki_Kita_description: "В ходе путча молодых офицеров передайте пост премьер-министра генералу Дзиндзабуро Масаки, а также добившись отречения Хирохито в пользу своего брата. Потерпите неудачу в сдерживании растущих амбиций молодых офицеров, вследствие чего они совершат ещё один переворот и потребуют передать власть их идеологу Икке Ките. После выполнения фокуса «Объединение народа вокруг императора» лидером станет император Ясухито."
 #
 JAP_Yasuhito_title: "$JAP_Ikki_Kita_title$"
 JAP_Yasuhito_description: "$JAP_Ikki_Kita_description$"
 #
 JAP_Fumimaro_Konoe_title: "«Перерождённый Даймё»\nКабинет Коноэ"
 JAP_Fumimaro_Konoe_description: "Подавите заговорщиков и передайте пост премьер-министра Хироте Коки. Не уговаривайте Коноэ занять пост лорда-хранителя Малой печати. Добейтесь ухода Хироты в отставку, после чего Сайондзи порекомендует в качестве кандидатуры премьер-министра принца Коноэ."
 #
 JAP_Fumimaro_Konoe_2_title: "«Связаться с плохой компанией»\nСоздание однопартийного государства"
 JAP_Fumimaro_Konoe_2_description: "Подавите заговорщиков и передайте пост премьер-министра Хироте Коки. Не уговаривайте Коноэ занять пост лорда-хранителя Малой печати. Добейтесь ухода Хироты в отставку, после чего Сайондзи порекомендует в качестве кандидатуры премьер-министра принца Коноэ. Отложите проведение реформ, после чего выполните фокус «Поддержать идеи реформистов». После выполнения фокуса «Создать авангардное подразделение партии» изменится система рекомендации премьер-министра, в результате чего станут доступны ещё 4 возможные альтернативные кандидатуры премьера."
 #
 JAP_Aso_Hisashi_2_title: "$JAP_Fumimaro_Konoe_2_title$"
 JAP_Aso_Hisashi_2_description: "$JAP_Fumimaro_Konoe_2_description$"
 #
 JAP_Inejiro_Asanuma_2_title: "$JAP_Fumimaro_Konoe_2_title$"
 JAP_Inejiro_Asanuma_2_description: "$JAP_Fumimaro_Konoe_2_description$"
 #
 JAP_Nobumasa_Suecegu_2_title: "$JAP_Fumimaro_Konoe_2_title$"
 JAP_Nobumasa_Suecegu_2_description: "$JAP_Fumimaro_Konoe_2_description$"
 #
 JAP_Yonezo_Maeda_title: "$JAP_Fumimaro_Konoe_2_title$"
 JAP_Yonezo_Maeda_description: "$JAP_Fumimaro_Konoe_2_description$"
 #
 JAP_Seigo_Nakano_2_title: "$JAP_Fumimaro_Konoe_2_title$"
 JAP_Seigo_Nakano_2_description: "$JAP_Fumimaro_Konoe_2_description$"
 #
 JAP_Hiranuma_Kiichiro_title: "«Не ломайте то, что работает»\nКабинет Хиранумы"
 JAP_Hiranuma_Kiichiro_description: "Выйдите в любой из нижеперечисленных путей: «Новое правительство Окады», «Кабинет инновационных бюрократов», «Кабинет Угаки», «Кабинет Хаяси», «Кабинет принца Коноэ». «Проиграйте» или потеряйте пост премьера в нём. В качестве следующего премьер-министра будет доступен Киитиро Хиранума."
 #
 JAP_Fusanosuke_Kuhara_2_title: "«Всем правит популизм»\nДоминирование фракции партийных реформаторов"
 JAP_Fusanosuke_Kuhara_2_description: "Создайте Ассоциацию помощи трону через кабинет Коноэ. Успешно завершите рассмотрение трёх её основополагающих вопросов. Поддерживайте легитимность Ассоциации. Если выполните фокус «Полноценная политическая партия», то усиливайте влияние фракции партийных реформаторов, чтобы она доминировала над другими. Если выполните фокус «Высший национальный политический комитет», то выбирайте нужного лидера в событии. Добейтесь ухода Коноэ в отставку, после чего появится возможность выбрать нового премьер-министра."
 #
 JAP_Ryutaro_Nagai_2_title: "$JAP_Fusanosuke_Kuhara_2_title$"
 JAP_Ryutaro_Nagai_2_description: "$JAP_Fusanosuke_Kuhara_2_description$"
 #
 JAP_Yosuke_Matsuoka_title: "«Сделать Японию великой снова»\nДоминирование фракции Мацуоки и бюрократов-реформаторов"
 JAP_Yosuke_Matsuoka_description: "Создайте Ассоциацию помощи трону через кабинет Коноэ. Успешно завершите рассмотрение трёх её основополагающих вопросов. Поддерживайте легитимность Ассоциации. Если выполните фокус «Полноценная политическая партия», то усиливайте влияние фракции Мацуоки, чтобы она доминировала над другими. Если выполните фокус «Высший национальный политический комитет», то выбирайте нужного лидера в событии. Добейтесь ухода Коноэ в отставку, после чего появится возможность выбрать нового премьер-министра."
 #
