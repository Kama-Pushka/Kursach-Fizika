     JAP_Hiranuma_Kiichiro_title: "«Не ломайте то, что работает»\nКабинет Хиранумы"
     JAP_Hiranuma_Kiichiro_description: "Выйдите в любой из нижеперечисленных путей: «Новое правительство Окады», «Кабинет инновационных бюрократов», «Кабинет Угаки», «Кабинет Хаяси», «Кабинет принца Коноэ». «Проиграйте» или потеряйте пост премьера в нём. В качестве следующего премьер-министра будет доступен Киитиро Хиранума."
     #
     JAP_Fusanosuke_Kuhara_2_title: "«Всем правит популизм»\nДоминирование фракции партийных реформаторов"
     JAP_Fusanosuke_Kuhara_2_description: "Создайте Ассоциацию помощи трону через кабинет Коноэ. Успешно завершите рассмотрение трёх её основополагающих вопросов. Поддерживайте легитимность Ассоциации. Если выполните фокус «Полноценная политическая партия», то усиливайте влияние фракции партийных реформаторов, чтобы она доминировала над другими. Если выполните фокус «Высший национальный политический комитет», то выбирайте нужного лидера в событии. Добейтесь ухода Коноэ в отставку, после чего появится возможность выбрать нового премьер-министра."
     #
