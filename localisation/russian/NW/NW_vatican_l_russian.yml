 ### фокусы ###
 
 VAT_pontificate_pius_xi: "Понтификат Пия XI"
 VAT_pontificate_pius_xi_desc:  "Понтификат — это эпоха земного служения Наместника Христа. Нынешний глава Церкви, Акилле Ратти, взошёл на Святой Престол под именем Пия XI в эпоху великих потрясений. Неустанно осуждая как безбожный коммунизм, так и радикальный расовый национализм в своих энцикликах, понтифик стремится укрепить духовный авторитет Римской курии. Судьба католического мира в этой новой глобальной бойне зависит от твёрдости его веры и мудрости его дипломатии."
 VAT_gendarmerie_corps: "Корпус Жандармерии Ватикана"
 VAT_gendarmerie_corps_desc:  "Созданный ещё в начале XIX века как Папская карабинерия, этот элитный корпус является гарантом внутренней стабильности Апостольского дворца. Жандармы несут круглосуточную службу, отвечая за государственную безопасность, охрану правопорядка, судебное дознание и пограничный контроль на рубежах Ватикана. Усиление корпуса позволит Папе Римскому надёжно защитить суверенитет микрогосударства от любых провокаций со стороны радикальных кругов Рима."
 VAT_palatine_guard: "Расширение Палатинской гвардии"
 VAT_palatine_guard_desc:  "Палатинская почетная гвардия, укомплектованная преданными престолу римскими гражданами, традиционно несёт церемониальную службу во время торжественных литургий. Однако в эпоху, когда светские державы бряцают оружием у самых стен собора Святого Петра, это ополчение должно быть расширено. Наделённая новыми оборонительными функциями, Палатинская гвардия станет надёжным внутренним щитом Святого Престола."
 VAT_involvment_italian_workers: "Привлечение итальянских рабочих "
 VAT_involvment_italian_workers_desc:  "Уникальный правовой статус и суверенная территория Ватикана, ограниченная Латеранскими соглашениями, накладывают жёсткие демографические ограничения на Апостольскую столицу. Острая нехватка квалифицированных рабочих рук в сфере строительства и обслуживания может быть легко решена. Мы откроем квоты для верных католиков из числа граждан Королевства Италия, готовых трудиться на благо Матери-Церкви."
 VAT_invest_stock_markets: "Вложения в фондовые рынки и недвижимость"
 VAT_invest_stock_markets_desc:  "Территория Ватиканских холмов полностью исключает возможность возведения фабричных труб или тяжёлых промышленных объектов. Нашим главным оружием в экономике должен стать капитал. Через Специальную администрацию святого престола мы направим финансовые средства в международные фондовые рынки, акции крупных европейских предприятий и ликвидную зарубежную недвижимость. Экономика иностранных держав должна приносить дивиденды для нужд католической миссии."
 VAT_railway_construction: "Железнодорожные ветки Ватикана"
 VAT_railway_construction_desc:  "Проект Ватиканской железной дороги, замороженный в былые годы из-за консервативных опасений Папы Пия X, наконец-то близок к завершению. В соответствии с договором, подписанным с итальянским правительством, мы завершим строительство самой короткой национальной ж/д ветки в мире. Соединив станцию у Ватиканских садов с магистралями Рима, мы обеспечим Святому Престолу независимый логистический канал для снабжения и приёма паломников."
 VAT_papal_science_academy: "Папская академия наук"
 VAT_papal_science_academy_desc:  "Переименованная и реорганизованная Папой Пием XI в 1936 году, Апостольская академия призвана служить мостом между верой и разумом. Поощряя исследования в области математики, физики и естествознания, Святой Престол доказывает, что истинная наука не противоречит божественному откровению. Инвестиции в умы лучших католических ученых позволят нам совершить важные технологические прорывы."
 VAT_religion_institute: "Институт религиозных дел"
 VAT_religion_institute_desc:  "Назрела необходимость создания централизованной дикастерии Римской курии, способной управлять финансами Церкви по всему миру. Институт религиозных дел станет уникальным, абсолютно независимым финансовым учреждением, защищенным от юрисдикции светских государств. Это позволит Святому Престолу проводить тайные финансовые операции и сохранять экономический суверенитет даже в условиях глобальной блокады."
 VAT_charity: "Благотворительность"
 VAT_charity_desc:  "На протяжении двух тысячелетий милосердие оставалось главным оружием Церкви. Расширение гуманитарных миссий, открытие бесплатных столовых, приютов и госпиталей под эгидой Ватикана укрепит моральный авторитет Папского престола в глазах мировой общественности и привлечет миллионы новых сторонников к нашему делу."
 VAT_underground_charitable_orgs: "Подпольные благотворительные организации"
 VAT_underground_charitable_orgs_desc:  "Агрессия великих держав ставит под угрозу существование католических общин, особенно в многострадальной Польше. Не имея возможности вмешаться в конфликт напрямую, мы развернем сеть тайной помощи. Лояльное польское духовенство и связи с местным Сопротивлением позволят нам не только спасать невинных, но и оперативно информировать Его Святейшество о преступлениях оккупационных режимов.»"
 VAT_non_abbiamo_bisogno: "«Non abbiamo bisogno»"
 VAT_non_abbiamo_bisogno_desc:  "Развитие тоталитаризма в Италии вынуждает Церковь подать свой голос. Изданная Папой Пием XI энциклика «Non abbiamo bisogno» прямо осуждает фашизм, обвиняя режим Бенито Муссолини в монополизации молодежи и насаждении языческого поклонения государству. Этот документ станет манифестом нашей духовной независимости от Римского диктатора."
 VAT_mit_brennender_sorge: "«Mit brennender Sorge»"
 VAT_mit_brennender_sorge_desc:  "Составленная на немецком языке и тайно зачитанная со всех кафедр Третьего Рейха, энциклика «Mit brennender Sorge» станет сокрушительным ударом по Берлину. Этот документ открыто осуждает нацистский режим за систематическое нарушение конкордата с Церковью, преследование духовенства и безумные расовые теории, в корне противоречащие христианскому учению."
 VAT_divini_redemptoris: "«Divini Redemptoris»"
 VAT_divini_redemptoris_desc:  "Воинствующий атеизм на востоке представляет смертельную угрозу для человечества. Энциклика «Divini Redemptoris» направлена на бескомпромиссное разоблачение большевизма и коммунистического учения. Его истинная цель — разрушить вековой общественный порядок, уничтожить институт семьи и подорвать самые устои христианской цивилизации."
 VAT_condemn_racism: "Осудить расизм"
 VAT_condemn_racism_desc:  "Идеи расового превосходства и биологического детерминизма отравляют европейскую культуру. Перед Богом нет ни эллина, ни иудея, и Ватикан должен громогласно заявить: расизм — это глубоко антихристианская концепция. Мы предадим анафеме любые попытки делить человечество на высшие и низшие касты."
 VAT_condemn_eretics: "Осудить «языческое поклонение государству»"
 VAT_condemn_eretics_desc:  "Современные диктатуры пытаются подменить Бога земными вождями и государственным аппаратом. Превращение государства в абсолютный идол — это опасная ересь. Святой Престол напоминает миру, что земная власть временна, а законы Господа стоят выше любых декретов светских правителей."
 VAT_peace_call: "Призыв к миру"
 VAT_peace_call_desc:  "Надвигающаяся на Европу катастрофа — это величайшая трагедия христианского мира, грозящая превзойти ужасы прошлой бойни. Святой Престол не может молча взирать на то, как нации готовятся истреблять друг друга ради амбиций земных вождей. С высоты Апостольского престола Папа Римский обращается ко всем народам и правителям с отчаянным призывом сложить оружие, сесть за стол переговоров и восстановить незыблемый христианский мир на континенте."
 VAT_conclave_1939: "Конклав 1939 года"
 VAT_conclave_1939_desc:  "Земной путь Папы Пия XI подошёл к концу, и Апостольский престол объявлен вакантным. В Сикстинской капелле под охраной Швейцарской гвардии собираются кардиналы со всего мира, чтобы укрыться от суеты и избрать нового Наместника Христа. В условиях, когда Европа стоит на пороге тотальной войны, Священная коллегия должна сделать судьбоносный выбор. Нам остаётся лишь уповать на Святого Духа и ждать, когда над Ватиканом поднимется белый дым."
 VAT_pontificate_pius_xii: "Понтификат Пия XII"
 VAT_pontificate_pius_xii_desc:  "Конклав вынес своё решение: новым главой Католической церкви избран Эудженио Пачелли, принявший имя Пия XII. Выдающийся дипломат и бывший государственный секретарь Святого Престола, он как никто другой понимает хрупкость европейской политики. Понтификат Пия XII начинается под знаком величайших испытаний. Новой Римской курии предстоит лавировать между тоталитарными режимами, защищая авторитет Матери-Церкви."
 VAT_first_consistory: "Первая консистория"
 VAT_first_consistory_desc:  "Сразу после восшествия на престол новому понтифику необходимо созвать Консисторию — торжественное собрание Кардинальской коллегии под председательством Папы. Это важнейший инструмент церковного управления, позволяющий утвердить новый курс Апостольской столицы, обновить состав Римской курии и скоординировать действия католического епископата в условиях нарастающего глобального кризиса."
 VAT_postpone_cardinals: "Отложить возведение новых кардиналов"
 VAT_postpone_cardinals_desc:  "Вся Европа охвачена пламенем войны, границы закрыты, а дипломатические каналы парализованы. В этих условиях созыв полноценной консистории и безопасное прибытие зарубежных епископов в Рим становятся физически невозможными. Святой Престол официально откладывает назначение новых кардиналов до лучших времён, сосредоточив всю полноту исполнительной власти в руках доверенного и суженного круга лиц внутри Ватикана."
 VAT_liturgic_reforms: "Литургические реформы"
 VAT_liturgic_reforms_desc:  "Опираясь на новую папскую энциклику Mediator Dei, Церковь делает шаг к обновлению богослужебной жизни. Мы должны вдохнуть новую жизнь в литургические церемонии, превратив мирян из пассивных созерцателей в активных участников таинств и жизни своих приходов. Напоминая христианскому миру о центральной важности Евхаристии, эти реформы укрепят дух верующих и сплотят общины перед лицом грядущих испытаний."
 VAT_canon_marie: "Канонизировать Марию Евфразию"
 #Mary Euphrasia Pelletier should be canonized because of the extraordinary life of faith and service to others. She founded the Congregation of Our Lady of Charity of the Good Shepherd, which has helped countless women and girls in need throughout the world. Despite facing many challenges and opposition, she remained committed to her mission and her love for God and others. The example of selflessness and dedication to the most vulnerable members of society continues to inspire people today, making her a worthy candidate for sainthood.
 VAT_canon_marie_desc:  "Святой Престол торжественно причисляет к лику святых Марию Евфразию Пеллетье, чья земная жизнь была образцом пламенной веры и жертвенного милосердия. Основанная ею Конгрегация Богоматери Милосердия Доброго Пастыря подарила надежду и спасение бесчисленным уязвимым женщинам и девочкам по всему миру. Стойкость Марии Евфразии перед лицом жизненных бурь станет великим источником вдохновения для всей католической паствы."
 #Gemma Galgani
 VAT_canon_jemma: "Канонизировать  Джемму Гальгани"
 VAT_canon_jemma_desc:  "Своим апостольским авторитетом мы провозглашаем святой Джемму Гальгани — великую мистичку и смиренную деву из Лукки. Её глубокие духовные откровения, видения Спасителя и Матери Божией, а также явление священных стигматов потрясли христианский мир. Канонизация блаженной Джеммы напомнит погрязшему в материализме и жестокости миру о подлинной силе молитвы, божественной любви и мистического единения с Господом."
 VAT_equality_principle: "Принцип равенства"
 VAT_equality_principle_desc:  "В своей первой программной энциклике Summi Pontificatus Папа Пий XII подтверждает фундаментальный христианский догмат о равенстве всех людей перед Творцом. Ссылаясь на слова апостола Павла о том, что «нет ни эллина, ни иудея», Святой Престол открыто осуждает расовый детерминизм и забвение человеческой солидарности. Католики всего мира призываются отбросить предрассудки и оказать деятельное сострадание и гуманитарную помощь всем жертвам войны, без различия их крови и происхождения."
 
